<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 아이디어 생성기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e2f; /* 게임 개발 감성으로 어두운 배경 */
            color: #ffffff;
        }
        .container {
            text-align: center;
            background-color: #2a2a40;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #4dd0e1;
            font-size: 28px;
            margin-bottom: 20px;
        }
        #result {
            font-size: 28px;
            font-weight: bold;
            color: #ffb74d;
            margin: 40px 0;
            min-height: 80px;
            line-height: 1.4;
            word-break: keep-all;
        }
        button {
            background-color: #ff5252;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: #ff1744;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💡 랜덤 게임 아이디어 제네레이터</h1>
    <div id="result">새로운 프로젝트 아이디어를 뽑아보세요!</div>
    <button onclick="generateGameIdea()">아이디어 굴리기 🎲</button>
</div>

<script>
    // ⚙️ 핵심 메커니즘 (Mechanics)
    const mechanics = [
        "시간을 되돌리는", "중력이 수시로 반전되는", "적을 아군으로 세뇌하는", 
        "소리로만 주변을 파악하는", "죽을수록 캐릭터가 강해지는", "그림자에만 숨을 수 있는",
        "키보드 버튼이 계속 바뀌는", "체력이 곧 재화(돈)인", "한 대만 맞아도 게임 오버인",
        "맵이 10초마다 무작위로 변하는", "점프를 할 수 없는", "적의 무기를 뺏어서 싸우는"
    ];

    // 🌌 배경 및 테마 (Themes)
    const themes = [
        "사이버펑크 지하도시", "버려진 심해 연구소", "누군가의 뒤틀린 꿈속", 
        "멸망한 마법 세계", "거대한 생물체의 뱃속", "평범한 회사원의 모니터 안",
        "중세 시대 도서관", "태양이 불타버린 우주정거장", "오염된 기계 무덤",
        "거인들이 사는 미니어처 방", "시간이 멈춘 시계탑", "모든 것이 픽셀로 이루어진 섬"
    ];

    // 🕹️ 게임 장르 (Genres)
    const genres = [
        "플랫포머", "로그라이크", "퍼즐 어드벤처", "덱빌딩 카드게임", 
        "리듬 액션", "타워 디펜스", "텍스트 기반 생존게임", "탑다운 슈팅(탄막)",
        "메트로배니아", "잠입 액션", "경영 시뮬레이션", "방치형 클리커"
    ];

    function generateGameIdea() {
        const getRandomWord = (array) => array[Math.floor(Math.random() * array.length)];

        const mechanic = getRandomWord(mechanics);
        const theme = getRandomWord(themes);
        const genre = getRandomWord(genres);

        // 결과 조립: [메커니즘] + [테마] + 배경의 + [장르]
        const resultText = `"${mechanic}"\n${theme} 배경의 ${genre}`;
        
        // 줄바꿈 적용을 위해 innerHTML 사용
        document.getElementById("result").innerHTML = resultText.replace(/\n/g, '<br>');
    }
</script>

</body>
</html>
